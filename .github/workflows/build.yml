name: Build PanVK Slim (Driver + Brain)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mesa (GitLab Mirror)
        uses: actions/checkout@v4
        with:
          repository: 'mesa/mesa'
          fetch-depth: 1

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build pkg-config bison flex \
                                 python3-mako python3-ply python3-setuptools

      - name: Create Android Cross File
        run: |
          cat <<EOF > android-aarch64.txt
          [binaries]
          c = '${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang'
          cpp = '${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang++'
          ar = '${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          strip = '${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'
          
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'
          EOF

      - name: Configure Mesa (Selective)
        run: |
          # Use "." to point to the source directory containing meson.build
          meson setup build-android . \
            --cross-file android-aarch64.txt \
            -Dbuildtype=release \
            -Dplatforms=android \
            -Dvulkan-drivers=panvk \
            -Dgallium-drivers=panfrost \
            -Dauto_features=disabled \
            -Dandroid-stub=true \
            -Dopengl=false \
            -Degl=disabled

      - name: Build PanVK Only
        run: |
          # Specifically targets the Vulkan driver; dependencies (NIR) are built automatically
          ninja -C build-android src/panfrost/vulkan/libvulkan_panfrost.so

      - name: Upload PanVK Driver
        uses: actions/upload-artifact@v4
        with:
          name: panvk-android-armv8
          path: build-android/src/panfrost/vulkan/libvulkan_panfrost.so
