name: Build PanVK from GitLab Mirror

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mesa (GitLab Mirror)
        uses: actions/checkout@v4
        with:
          repository: 'mesa/mesa' # This is the official GitHub mirror of the GitLab repo
          fetch-depth: 1

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Create Cross File
        run: |
          cat <<EOF > android-aarch64.txt
          [binaries]
          c = '${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang'
          cpp = '${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang++'
          ar = '${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          strip = '${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'
          EOF

      - name: Install Dependencies
        run: sudo apt-get install -y meson ninja-build pkg-config bison flex python3-mako

      - name: Configure Mesa
        run: |
          meson setup build-android \
            --cross-file android-aarch64.txt \
            -Dbuildtype=release \
            -Dplatforms=android \
            -Dvulkan-drivers=panvk \
            -Dgallium-drivers=panfrost \
            -Dauto_features=disabled \
            -Dandroid-stub=true

      - name: Compile PanVK "Brain" and Driver Only
        run: |
          # Specifically targeting the .so file avoids building the whole project
          ninja -C build-android src/panfrost/vulkan/libvulkan_panfrost.so

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: panvk-android-armv8
          path: build-android/src/panfrost/vulkan/libvulkan_panfrost.so
