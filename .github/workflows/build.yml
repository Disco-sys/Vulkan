name: Build PanVK (Mali Vulkan) Only

on:
  workflow_dispatch:

jobs:
  build-panvk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mesa
        uses: actions/checkout@v4
        with:
          repository: 'Mesa3D/mesa'
          fetch-depth: 1

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Create Minimal Cross-File
        run: |
          cat <<EOF > android-aarch64.txt
          [binaries]
          c = '${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang'
          cpp = '${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang++'
          ar = '${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          strip = '${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'
          EOF

      - name: Build PanVK Only
        run: |
          # The "brain" (NIR/Panfrost common) is automatically built when panvk is requested
          meson setup build \
            --cross-file android-aarch64.txt \
            -Dbuildtype=release \
            -Dplatforms=android \
            -Dgallium-drivers=panfrost \
            -Dvulkan-drivers=panvk \
            -Dauto_features=disabled \
            -Dgallium-vdpau=disabled \
            -Dgallium-va=disabled \
            -Dgallium-xa=disabled \
            -Dgles1=disabled \
            -Dgles2=disabled \
            -Dopengl=false \
            -Dgbm=disabled \
            -Degl=disabled \
            -Dllvm=disabled \
            -Dlmsensors=disabled \
            -Dshared-glapi=disabled \
            --prefix=$(pwd)/install

          ninja -C build install

      - name: Upload PanVK Driver
        uses: actions/upload-artifact@v4
        with:
          name: panvk-driver-armv8
          path: build/src/panfrost/vulkan/libvulkan_panfrost.so
